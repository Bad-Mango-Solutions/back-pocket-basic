name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    workflow_call:

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: write
            issues: write
            actions: write
            pull-requests: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '10.0.x'

            - name: Restore dependencies
              run: dotnet restore BackPocketBasic.slnx
